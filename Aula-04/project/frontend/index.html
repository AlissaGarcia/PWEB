<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Pastelaria do Zé - Sistema de Pedidos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Pastelaria do Zé</h1>

  <div class="cliente-info">
    <h2>Informações do Cliente</h2>
    <input type="text" id="nome-cliente" placeholder="Nome do Cliente" required>
    <input type="tel" id="telefone-cliente" placeholder="Telefone (WhatsApp)" required>
  </div>

  <div class="form">
    <select id="produto">
      <option value="">Selecione um produto</option>
      <option value="pastel">Pastel - R$ 5,00</option>
      <option value="caldo">Caldo - R$ 8,00</option>
      <option value="refrigerante">Refrigerante - R$ 4,00</option>
      <option value="suco">Suco - R$ 3,00</option>
    </select>

    <input type="number" id="qtd" placeholder="Quantidade" min="1" required>

    <button id="btn-adicionar" type="button">Adicionar ao Pedido</button>
  </div>

  <div class="desconto">
    <label for="desconto-valor">Desconto (R$):</label>
    <input type="number" id="desconto-valor" placeholder="0,00" min="0" step="0.01">
  </div>

  <div class="lista">
    <h2>Itens do Pedido</h2>
    <ul id="lista"></ul>
  </div>

  <div class="resumo" aria-live="polite">
    <h2>Resumo do Pedido</h2>
    <p>Subtotal: R$ <span id="subtotal">0,00</span></p>
    <p>Desconto: R$ <span id="desconto">0,00</span></p>
    <p>Taxa de Entrega: R$ <span id="taxa">5,00</span></p>
    <p class="total-final">Total Final: R$ <span id="total-final">0,00</span></p>
  </div>

  <button id="btn-finalizar" type="button">Finalizar Pedido</button>

  <div class="pedidos-existentes">
    <h2>Pedidos Existentes</h2>
    <button id="btn-listar">Listar Pedidos</button>
    <ul id="lista-pedidos"></ul>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
